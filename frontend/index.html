<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Traveloop · Plan Your Next Adventure</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="preload" href="/loading.gif" as="image" />
  </head>
  <body>
    <div id="root">
      <!-- Pre-React loading splash — auto-replaced when React mounts -->
      <div id="app-loader" aria-label="Loading Traveloop" role="status">
        <img src="/loading.gif" alt="" />
        <span class="sr-only">Loading…</span>
      </div>
      <style>
        #app-loader {
          position: fixed;
          inset: 0;
          z-index: 9999;
          display: flex;
          align-items: center;
          justify-content: center;
          background: rgba(0, 0, 0, 0.5);
          backdrop-filter: blur(12px);
          -webkit-backdrop-filter: blur(12px);
          transition: opacity 0.3s ease-out;
        }
        #app-loader img {
          width: clamp(150px, 22vw, 350px);
          height: auto;
          image-rendering: -webkit-optimize-contrast;
          image-rendering: crisp-edges;
          pointer-events: none;
          user-select: none;
        }
        .sr-only {
          position: absolute; width: 1px; height: 1px;
          padding: 0; margin: -1px; overflow: hidden;
          clip: rect(0,0,0,0); white-space: nowrap; border: 0;
        }
      </style>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
